# This is a basic workflow to help you get started with Actions
name: CI Pipeline

on: 
  push:
      branches:
        - main

  workflow_dispatch:

jobs:
  
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: 
          node-version: 20

      - run: npm install

      - run: npm test

      - run: npm run build
